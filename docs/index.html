<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin deal finder</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px 64px;
    color: #1a1a1a;
    background: #fafafa;
  }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  #updated { color: #666; font-size: 13px; margin-bottom: 24px; }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 8px;
    padding: 12px 16px;
  }
  .stat-label { font-size: 12px; color: #666; margin: 0 0 4px; }
  .stat-value { font-size: 22px; font-weight: 600; margin: 0; }
  select {
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
  }
  th, td {
    text-align: left;
    padding: 10px 8px;
    border-bottom: 1px solid #eee;
  }
  th { color: #666; font-weight: 600; background: #f5f5f5; }
  td.num, th.num { text-align: right; }
  a { color: #0a5fc7; text-decoration: none; }
  .badge {
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .badge-high { background: #e3f5e9; color: #1b6e3c; }
  .badge-medium { background: #fdf1da; color: #8a5a10; }
  .badge-low { background: #eee; color: #666; }
  .controls { margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .controls label { font-size: 13px; color: #666; }
  #empty-state { color: #666; padding: 32px 0; text-align: center; }
</style>
</head>
<body>

<h1>Coin deal finder</h1>
<p id="updated">Loading...</p>

<div class="stats" id="stats"></div>

<div class="controls">
  <label for="sortSelect">Sort by</label>
  <select id="sortSelect">
    <option value="profit_pct">Profit margin</option>
    <option value="confidence">Confidence</option>
    <option value="current_bid">Current bid</option>
  </select>
</div>

<table id="dealTable">
  <thead>
    <tr>
      <th>Item</th>
      <th class="num">Current bid</th>
      <th class="num">Est. value</th>
      <th class="num">Profit</th>
      <th>Confidence</th>
      <th>Time left</th>
      <th></th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div id="empty-state" style="display:none;">No listings yet. Check back after the next daily run.</div>

<script>
const confRank = { High: 3, Medium: 2, Low: 1 };

function badgeClass(conf) {
  if (conf === "High") return "badge-high";
  if (conf === "Medium") return "badge-medium";
  return "badge-low";
}

function money(n) {
  if (n === null || n === undefined) return "—";
  return "$" + Number(n).toLocaleString(undefined, { maximumFractionDigits: 0 });
}

function render(listings, sortKey) {
  const sorted = [...listings];
  if (sortKey === "profit_pct") sorted.sort((a, b) => (b.profit_pct ?? -999) - (a.profit_pct ?? -999));
  else if (sortKey === "confidence") sorted.sort((a, b) => confRank[b.confidence] - confRank[a.confidence]);
  else if (sortKey === "current_bid") sorted.sort((a, b) => (a.current_bid ?? 0) - (b.current_bid ?? 0));

  const tbody = document.querySelector("#dealTable tbody");
  tbody.innerHTML = "";

  if (sorted.length === 0) {
    document.getElementById("empty-state").style.display = "block";
    return;
  }
  document.getElementById("empty-state").style.display = "none";

  sorted.forEach(item => {
    const tr = document.createElement("tr");
    const profitText = item.profit !== null && item.profit !== undefined
      ? `${money(item.profit)} (${item.profit_pct}%)`
      : "—";
    tr.innerHTML = `
      <td>${item.name ?? "Untitled listing"}</td>
      <td class="num">${money(item.current_bid)}</td>
      <td class="num">${money(item.estimated_value)}</td>
      <td class="num">${profitText}</td>
      <td><span class="badge ${badgeClass(item.confidence)}">${item.confidence}</span></td>
      <td>${item.time_left ?? "—"}</td>
      <td>${item.url ? `<a href="${item.url}" target="_blank" rel="noopener">View →</a>` : ""}</td>
    `;
    tbody.appendChild(tr);
  });
}

fetch("data.json")
  .then(res => res.json())
  .then(data => {
    document.getElementById("updated").textContent = "Last updated: " + (data.generated_at ?? "unknown");
    const listings = data.listings ?? [];

    const highConf = listings.filter(l => l.confidence === "High").length;
    const bestMargin = listings.reduce((max, l) => Math.max(max, l.profit_pct ?? -Infinity), -Infinity);

    document.getElementById("stats").innerHTML = `
      <div class="stat-card"><p class="stat-label">Listings scanned</p><p class="stat-value">${listings.length}</p></div>
      <div class="stat-card"><p class="stat-label">High-confidence deals</p><p class="stat-value">${highConf}</p></div>
      <div class="stat-card"><p class="stat-label">Best margin found</p><p class="stat-value">${bestMargin > -Infinity ? bestMargin + "%" : "—"}</p></div>
    `;

    render(listings, "profit_pct");
    document.getElementById("sortSelect").addEventListener("change", e => render(listings, e.target.value));
  })
  .catch(() => {
    document.getElementById("updated").textContent = "No data yet.";
    document.getElementById("empty-state").style.display = "block";
  });
</script>

</body>
</html>
